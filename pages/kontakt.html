<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kontakt — {{SITE_NAME}}</title>
  <meta name="description" content="Kontaktieren Sie {{SITE_NAME}}. Wir freuen uns auf Ihre Nachricht.">
  <meta name="robots" content="index, follow">
  <meta property="og:title" content="Kontakt — {{SITE_NAME}}">
  <meta property="og:description" content="Kontaktieren Sie {{SITE_NAME}}. Wir freuen uns auf Ihre Nachricht.">
  <meta property="og:url" content="{{SITE_URL}}/kontakt.html">
  <meta property="og:type" content="website">
  <link rel="icon" href="img/logo.png" type="image/png">
  <link rel="stylesheet" href="base.css">
  <link rel="stylesheet" href="layouts/{{LAYOUT}}.css">
  <link rel="stylesheet" href="heroes/{{HERO}}.css">
  <link rel="stylesheet" href="buttons/{{BUTTONS}}.css">
  <link rel="stylesheet" href="softness/{{CHARAKTER}}.css">
  <link rel="stylesheet" href="spacing/{{SPACING}}.css">
  <link rel="stylesheet" href="animation/{{ANIMATION}}.css">
  <link rel="stylesheet" href="widths/{{WIDTH}}.css">
  <link rel="stylesheet" href="fonts/{{FONT_MODULE}}.css">
  <link rel="stylesheet" href="colors/{{COLOR_MODULE}}.css">
  <link rel="stylesheet" href="theme.css">
</head>
<body class="layout-{{LAYOUT}}" data-modules="{{MODULES}}">

  <div id="site-header"></div>

  <!-- Page Hero -->
  <div class="page-hero" id="main-content">
    <div class="container">
      <p class="section-tag">Kontakt</p>
      <h1 class="section-title">Schreiben Sie uns</h1>
      <p class="section-lead mx-auto">Wir freuen uns auf Ihre Nachricht und melden uns schnellstmöglich bei Ihnen.</p>
    </div>
  </div>

  <!-- Contact Content -->
  <section>
    <div class="container">
      <div class="grid-2">
        <!-- Contact Info (links) -->
        <div>
          <h3>Kontaktdaten</h3>
          <div class="divider"></div>
          <p><strong>{{CONTACT_NAME}}</strong></p>
          <p>{{CONTACT_ADDRESS}}</p>
          <p>
            <a href="tel:{{CONTACT_PHONE_RAW}}">{{CONTACT_PHONE}}</a><br>
            <a href="mailto:{{CONTACT_EMAIL}}">{{CONTACT_EMAIL}}</a>
          </p>

          <!-- Opening hours (hidden when empty) -->
          <div class="opening-hours-block">
          <h3 class="mt-xl">Öffnungszeiten</h3>
          <div class="divider"></div>
          <p>{{OPENING_HOURS}}</p>
          </div>

          <!-- Map -->
          <div id="map-container" class="mt-xl rounded overflow-hidden"
               data-address="{{CONTACT_ADDRESS}}"
               data-height="300">
          </div>
        </div>

        <!-- Contact Form (rechts) -->
        <div>
          <form action="contact.php" method="POST" data-ajax>
            <div class="form-group">
              <label for="contact-name">Name *</label>
              <input type="text" id="contact-name" name="name" required autocomplete="name" placeholder="Ihr Name">
            </div>
            <div class="form-group">
              <label for="contact-email">E-Mail *</label>
              <input type="email" id="contact-email" name="email" required autocomplete="email" placeholder="ihre@email.at">
            </div>
            <div class="form-group">
              <label for="contact-phone">Telefon</label>
              <input type="tel" id="contact-phone" name="phone" autocomplete="tel" placeholder="Ihre Telefonnummer">
            </div>
            <div class="form-group">
              <label for="contact-subject">Betreff</label>
              <input type="text" id="contact-subject" name="subject" placeholder="Betreff Ihrer Nachricht">
            </div>
            <div class="form-group">
              <label for="contact-message">Nachricht *</label>
              <textarea id="contact-message" name="message" required rows="6" placeholder="Ihre Nachricht an uns..."></textarea>
            </div>
            <!-- Honeypot -->
            <div class="form-hp" aria-hidden="true">
              <label for="contact-website">Website</label>
              <input type="text" id="contact-website" name="website" tabindex="-1" autocomplete="off">
            </div>
            <button type="submit" class="btn btn-primary btn-lg">Nachricht senden</button>
          </form>
        </div>
      </div>
    </div>
  </section>

  <div id="site-footer"></div>

  <script>
    window.SITE_CONFIG = {
      name: "{{SITE_NAME}}",
      logo: "img/logo.png",
      nav: [{{NAV_ITEMS}}],
      contact: {
        name: "{{CONTACT_NAME}}",
        email: "{{CONTACT_EMAIL}}",
        phone: "{{CONTACT_PHONE}}",
        address: "{{CONTACT_ADDRESS}}"
      },
      social: { {{SOCIAL_LINKS}} },
      footer: { tagline: "{{FOOTER_TAGLINE}}", credit: true },
      modules: [{{MODULES_LIST}}]
    };
  </script>
  <script src="shared.js"></script>
</body>
</html>
