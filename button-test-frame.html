<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="base.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 70px;
  padding: 10px 16px;
  font-family: 'Inter', system-ui, sans-serif;
}
.hero-ctas {
  display: flex;
  gap: 12px;
  align-items: center;
  position: relative;
  z-index: 2;
}
.hero { min-height: auto !important; padding: 10px 16px !important; overflow: visible !important; margin: 0 !important; }
</style>
</head>
<body>
<script>
(function() {
  var params = new URLSearchParams(location.search);
  var mod = params.get('mod') || 'soft-round';
  var bg = params.get('bg') || 'light';

  // Load button module CSS
  var link = document.createElement('link');
  link.rel = 'stylesheet';
  link.href = 'buttons/' + mod + '.css';
  document.head.appendChild(link);

  if (bg === 'dark') {
    document.body.style.background = '#1a1a1a';
    document.body.style.position = 'relative';

    var section = document.createElement('section');
    section.className = 'hero hero--fullscreen hero--image';
    section.style.cssText = 'display:flex;align-items:center;justify-content:center;background:transparent;';

    var heroBg = document.createElement('div');
    heroBg.className = 'hero-bg';
    heroBg.style.cssText = 'background-image:url(https://images.unsplash.com/photo-1497366216548-37526070297c?w=400&q=40);position:absolute;inset:0;background-size:cover;background-position:center;';
    section.appendChild(heroBg);

    var heroContent = document.createElement('div');
    heroContent.className = 'hero-content';
    heroContent.style.cssText = 'position:relative;z-index:1;text-align:center;max-width:none;padding:0;';

    var ctas = document.createElement('div');
    ctas.className = 'hero-ctas';

    var btnPrimary = document.createElement('a');
    btnPrimary.href = '#';
    btnPrimary.className = 'btn btn-primary';
    btnPrimary.textContent = 'Button';
    btnPrimary.onclick = function() { return false; };

    var btnGhost = document.createElement('a');
    btnGhost.href = '#';
    btnGhost.className = 'btn btn-ghost';
    btnGhost.textContent = 'Ghost';
    btnGhost.onclick = function() { return false; };

    ctas.appendChild(btnPrimary);
    ctas.appendChild(btnGhost);
    heroContent.appendChild(ctas);
    section.appendChild(heroContent);
    document.body.appendChild(section);
  } else {
    document.body.style.background = '#fafafa';

    var ctas2 = document.createElement('div');
    ctas2.className = 'hero-ctas';

    var btnP = document.createElement('a');
    btnP.href = '#';
    btnP.className = 'btn btn-primary';
    btnP.textContent = 'Button';
    btnP.onclick = function() { return false; };

    var btnG = document.createElement('a');
    btnG.href = '#';
    btnG.className = 'btn btn-ghost';
    btnG.textContent = 'Ghost';
    btnG.onclick = function() { return false; };

    ctas2.appendChild(btnP);
    ctas2.appendChild(btnG);
    document.body.appendChild(ctas2);
  }
})();
</script>
</body>
</html>
