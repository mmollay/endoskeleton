<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Button Module Test</title>
<link rel="stylesheet" href="base.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', system-ui, sans-serif; background: #f5f5f5; padding: 2rem; }
h1 { text-align: center; margin-bottom: 0.5rem; font-size: 1.5rem; }
.subtitle { text-align: center; color: #666; margin-bottom: 2rem; font-size: 0.9rem; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 1.5rem; max-width: 1400px; margin: 0 auto; }
.card { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.card-header { padding: 0.75rem 1rem; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
.card-header h3 { font-size: 0.85rem; font-weight: 600; }
.card-header code { font-size: 0.7rem; color: #999; }
</style>
</head>
<body>

<h1>Button Module Test — Alle 24 Module</h1>
<p class="subtitle">Oben: heller Hintergrund | Unten: dunkler Hero-Bild-Hintergrund</p>

<div class="grid" id="grid"></div>

<script>
var MODULES = [
  'rect-solid', 'rect-outline', 'pill-solid', 'pill-thin',
  'soft-round', 'ghost-tint', 'brutalist', 'cta-arrow',
  'tech-angle', 'shadow-lift', 'gradient-cta', 'chip',
  'heavy-bold', 'minimal-link', 'bold', 'tactical',
  'tech', 'sharp', 'rounded', 'soft',
  'ghost', 'outline', 'outline-thin', 'outline-elegant'
];

var grid = document.getElementById('grid');

MODULES.forEach(function(mod) {
  var card = document.createElement('div');
  card.className = 'card';

  var header = document.createElement('div');
  header.className = 'card-header';
  var h3 = document.createElement('h3');
  h3.textContent = mod;
  var code = document.createElement('code');
  code.textContent = mod + '.css';
  header.appendChild(h3);
  header.appendChild(code);
  card.appendChild(header);

  // Light row iframe
  var iframeLight = document.createElement('iframe');
  iframeLight.style.cssText = 'border:none;width:100%;height:70px;display:block;';
  iframeLight.setAttribute('scrolling', 'no');
  iframeLight.src = 'button-test-frame.html?mod=' + mod + '&bg=light';
  card.appendChild(iframeLight);

  // Dark row iframe
  var iframeDark = document.createElement('iframe');
  iframeDark.style.cssText = 'border:none;width:100%;height:70px;display:block;';
  iframeDark.setAttribute('scrolling', 'no');
  iframeDark.src = 'button-test-frame.html?mod=' + mod + '&bg=dark';
  card.appendChild(iframeDark);

  grid.appendChild(card);
});
</script>

</body>
</html>
